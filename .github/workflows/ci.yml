name: Build and test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and test
        shell: powershell
        run: .\scripts\build.ps1

      - name: Package Windows release
        shell: powershell
        run: .\scripts\package.ps1 -SkipBuild

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pitchify-win-x64
          path: release/Pitchify-win-x64.zip
          if-no-files-found: error
