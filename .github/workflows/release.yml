name: Publish release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build, test, and package
        shell: powershell
        run: |
          .\scripts\build.ps1
          .\scripts\package.ps1 -SkipBuild

      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:GITHUB_REF_NAME
          $asset = ".\release\Pitchify-win-x64.zip"
          $maximumAttempts = 5

          for ($attempt = 1; $attempt -le $maximumAttempts; $attempt++) {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) {
              break
            }

            gh release create $tag `
              --verify-tag `
              --generate-notes `
              --title "Pitchify $tag" `
              --draft
            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($attempt -eq $maximumAttempts) {
              throw "GitHub could not create the release after $maximumAttempts attempts."
            }
            Start-Sleep -Seconds 10
          }

          for ($attempt = 1; $attempt -le $maximumAttempts; $attempt++) {
            gh release upload $tag $asset --clobber
            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($attempt -eq $maximumAttempts) {
              throw "GitHub could not upload the release asset after $maximumAttempts attempts."
            }
            Start-Sleep -Seconds 10
          }

          for ($attempt = 1; $attempt -le $maximumAttempts; $attempt++) {
            gh release edit $tag --draft=false --latest
            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($attempt -eq $maximumAttempts) {
              throw "GitHub could not publish the release after $maximumAttempts attempts."
            }
            Start-Sleep -Seconds 10
          }
